name: Publish VS Code Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension (.vsix)
        run: npx vsce package
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: cognitive-skills-engine-vsix
          path: '*.vsix'

      - name: Publish to VS Code Marketplace
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: npx vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX (Windsurf/Cursor compatible)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_PAT }}

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          body: |
            ## Cognitive Skills Engine ${{ github.ref_name }}

            Install in VS Code:
            ```bash
            code --install-extension cognitive-skills-engine-${{ github.ref_name }}.vsix
            ```

            Or search "Cognitive Skills Engine" in the VS Code extension panel.

            **Works with:** VS Code, Windsurf, Cursor, VSCodium
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npm run compile
      - name: Test CLI
        run: |
          node cli/index.js list
          node cli/index.js board | head -30
          node cli/index.js inject A2 | head -20
          node cli/index.js route "prove a theorem" | head -10
