<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognitive Skills Engine</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" width="24" height="24">
        <rect width="24" height="24" rx="4" fill="#1a1a2e"/>
        <circle cx="4" cy="5" r="1.5" fill="#4fc3f7"/>
        <circle cx="8" cy="5" r="1.5" fill="#4fc3f7"/>
        <circle cx="12" cy="5" r="1.5" fill="#4fc3f7"/>
        <circle cx="16" cy="5" r="1.5" fill="#4fc3f7"/>
        <circle cx="20" cy="5" r="1.5" fill="#4fc3f7"/>
        <circle cx="4" cy="10" r="1.5" fill="#ffb74d"/>
        <circle cx="8" cy="10" r="1.5" fill="#ffb74d"/>
        <circle cx="12" cy="10" r="1.5" fill="#ffb74d"/>
        <circle cx="16" cy="10" r="1.5" fill="#ffb74d"/>
        <circle cx="20" cy="10" r="1.5" fill="#ffb74d"/>
        <circle cx="4" cy="15" r="1.5" fill="#81c784"/>
        <circle cx="8" cy="15" r="1.5" fill="#81c784"/>
        <circle cx="12" cy="15" r="1.5" fill="#81c784"/>
        <circle cx="16" cy="15" r="1.5" fill="#81c784"/>
        <circle cx="20" cy="15" r="1.5" fill="#81c784"/>
        <circle cx="4" cy="20" r="1.5" fill="#ce93d8"/>
        <circle cx="8" cy="20" r="1.5" fill="#ce93d8"/>
        <circle cx="12" cy="20" r="1.5" fill="#ce93d8"/>
        <circle cx="16" cy="20" r="2.5" fill="#fff"/>
        <circle cx="20" cy="20" r="1.5" fill="#ce93d8"/>
      </svg>
    </div>
    <div class="title">
      <span class="name">Cognitive Skills Engine</span>
      <span class="version">v1.0</span>
    </div>
  </div>

  <div class="board-label">COGNITION BOARD</div>
  <div class="board" id="board"></div>

  <div class="section-label">QUICK INJECT</div>
  <div class="quick-btns">
    <button class="btn btn-primary" id="btn-master" title="Inject full system prompt">
      ★ Master Skill
    </button>
    <button class="btn btn-tc" id="btn-tc" title="Token Compression only">
      TC [A1]
    </button>
  </div>

  <div class="section-label">PATH</div>
  <div class="path-display" id="path-display">D5·A1·D6</div>
  <div class="path-btns">
    <button class="btn-small" id="btn-copy-path">Copy</button>
    <button class="btn-small" id="btn-reset-path">Reset</button>
  </div>

  <div class="footer">
    <a href="https://github.com/Agnuxo1/Token-compression-system-for-improving-agent-cognition" target="_blank">GitHub</a>
    <span>·</span>
    <a href="#" id="btn-route">Auto-route task</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
