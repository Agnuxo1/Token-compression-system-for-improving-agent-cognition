<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a2e"/>
  <!-- Board grid (6x4 dots representing the cognition board) -->
  <g fill="#4fc3f7" opacity="0.9">
    <!-- Row A (science) -->
    <circle cx="18" cy="22" r="4"/>
    <circle cx="32" cy="22" r="4"/>
    <circle cx="46" cy="22" r="4"/>
    <circle cx="60" cy="22" r="4"/>
    <circle cx="74" cy="22" r="4"/>
    <circle cx="88" cy="22" r="4"/>
    <!-- Row B (humanities) -->
    <circle cx="18" cy="38" r="4" fill="#ffb74d"/>
    <circle cx="32" cy="38" r="4" fill="#ffb74d"/>
    <circle cx="46" cy="38" r="4" fill="#ffb74d"/>
    <circle cx="60" cy="38" r="4" fill="#ffb74d"/>
    <circle cx="74" cy="38" r="4" fill="#ffb74d"/>
    <circle cx="88" cy="38" r="4" fill="#ffb74d"/>
    <!-- Row C (applied) -->
    <circle cx="18" cy="54" r="4" fill="#81c784"/>
    <circle cx="32" cy="54" r="4" fill="#81c784"/>
    <circle cx="46" cy="54" r="4" fill="#81c784"/>
    <circle cx="60" cy="54" r="4" fill="#81c784"/>
    <circle cx="74" cy="54" r="4" fill="#81c784"/>
    <circle cx="88" cy="54" r="4" fill="#81c784"/>
    <!-- Row D (synthesis/master) -->
    <circle cx="18" cy="70" r="4" fill="#ce93d8"/>
    <circle cx="32" cy="70" r="4" fill="#ce93d8"/>
    <circle cx="46" cy="70" r="4" fill="#ce93d8"/>
    <circle cx="60" cy="70" r="4" fill="#ce93d8"/>
    <!-- Master cell (highlighted) -->
    <circle cx="74" cy="70" r="7" fill="#ffffff" opacity="0.95"/>
    <circle cx="88" cy="70" r="4" fill="#ce93d8"/>
  </g>
  <!-- Star in master cell -->
  <text x="74" y="74" text-anchor="middle" font-size="8" fill="#1a1a2e" font-weight="bold">★</text>
  <!-- Path lines suggestion -->
  <g stroke="#4fc3f7" stroke-width="1" opacity="0.3" fill="none">
    <line x1="74" y1="70" x2="18" y2="22"/>
    <line x1="74" y1="70" x2="32" y2="22"/>
    <line x1="18" y1="22" x2="32" y2="22"/>
  </g>
  <!-- Label -->
  <text x="53" y="90" text-anchor="middle" font-size="7" fill="#ffffff" opacity="0.7" font-family="monospace">CSE</text>
</svg>
